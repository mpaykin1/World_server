<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Выживач</title>
<link rel="stylesheet" href="/shared/style.css">
<style>
#stats{position:fixed;left:10px;top:10px;z-index:25;width:170px;padding:6px 8px;border-radius:8px;font-size:11px}
.bar{height:10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);margin:4px 0;border-radius:4px;overflow:hidden}.bar span{display:block;height:100%;width:80%}.hp span{background:#4bd35b}.hun span{background:#e5a333}.thr span{background:#3ba7ff}
#survivalHelp{position:fixed;left:50%;top:10px;transform:translateX(-50%);z-index:25;padding:4px 8px;border-radius:999px;background:rgba(0,0,0,.25);border:1px solid var(--line);font-size:10px}
#backLink{position:fixed;left:10px;top:90px;z-index:30;color:#bce5ff;text-decoration:none;font-size:11px}
#damagePrompt{position:fixed;left:50%;top:56%;transform:translate(-50%,-50%);z-index:30;padding:5px 8px;border-radius:6px;background:rgba(0,0,0,.25);border:1px solid var(--line);font-size:11px}
#buildPanel{position:fixed;right:10px;bottom:76px;z-index:35;width:300px;padding:8px;border-radius:10px}.buildMode{color:var(--gold);font-size:11px}.buildGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}.buildBtn{height:40px;background:rgba(31,38,46,.4);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#fff;cursor:pointer;font-size:10px}.buildBtn.active{outline:2px solid #63d7ff;background:rgba(39,57,74,.5)}.craftGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:6px}.craftBtn{height:32px;background:rgba(34,31,28,.4);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#fff;cursor:pointer;font-size:10px}.invTitle{font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;font-size:11px}
#hotbarWrap{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:45;padding:4px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 20px rgba(0,0,0,.2)}
#hotbarGrid{display:grid;grid-template-columns:repeat(9,40px);gap:2px}.mcSlot{height:40px;border:2px solid #373737;background:rgba(139,139,139,.35);box-shadow:inset 2px 2px rgba(207,207,207,.2),inset -2px -2px rgba(64,64,64,.2);position:relative;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;text-shadow:2px 2px #222;cursor:pointer}.mcSlot.sel{outline:3px solid #fff;outline-offset:-1px}.mcSlot span{position:absolute;right:3px;bottom:1px;font:bold 11px Consolas;color:#fff;text-shadow:2px 2px #000}.slotNum{position:absolute;left:3px;top:1px;font:9px Consolas;color:#252525;text-shadow:none}
#inventory{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:55;width:400px;padding:10px;background:rgba(198,198,198,.35);border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 40px rgba(0,0,0,.4);color:#eef6ff;font-family:Consolas,monospace;backdrop-filter:blur(4px)}.inventoryHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-weight:bold;font-size:11px}.inventoryHint{font-size:10px;color:#9fb0c0}.mcInv{display:grid;grid-template-columns:repeat(9,40px);gap:3px}.mcInv .mcSlot{background:rgba(127,127,127,.35)}.invSep{height:8px}.itemName{position:fixed;left:50%;bottom:62px;transform:translateX(-50%);z-index:50;padding:5px 10px;border-radius:6px;background:rgba(0,0,0,.4);border:1px solid var(--line);font-family:Consolas,monospace;font-size:11px}
</style>
</head>
<body>
<div id="survivalHelp">WASD · Shift бег · ЛКМ добыча/стройка · B стройка · R поворот · 1-9 слот · I/E инвентарь · Enter чат</div>
<div id="stats" class="hud-panel"><b id="playerName">Player</b><div class="bar hp"><span id="hpBar"></span></div><div class="bar hun"><span id="hunBar"></span></div><div class="bar thr"><span id="thrBar"></span></div></div>
<a id="backLink" href="/apps/catalog/">← 3D каталог</a>
<div class="crosshair"></div>
<div id="damagePrompt" class="hidden">ЛКМ / E — добыть ресурс</div>
<div id="inventory"><div class="inventoryHead"><span>Inventory</span><span class="inventoryHint">Minecraft-style · I/E закрыть</span></div><div id="invGrid" class="mcInv"></div><div class="invSep"></div><div class="inventoryHead"><span>Hotbar</span><span class="inventoryHint">1-9 выбрать</span></div><div id="invHotGrid" class="mcInv"></div></div>
<div id="hotbarWrap"><div id="hotbarGrid"></div></div>
<div id="buildPanel" class="hud-panel"><div class="invTitle"><span class="buildMode">Rust-style Building Plan</span><span id="buildState">B: выкл</span></div><div class="buildGrid" id="buildGrid"></div><div class="craftGrid" id="craftGrid"></div></div>
<div class="itemName hidden" id="itemName"></div>
<script src="/shared/common.js"></script>
<script type="module" src="./client.js"></script>
</body>
</html>
